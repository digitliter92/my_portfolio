<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Embedded & Control Engineering</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        :root {
            --cobalt-blue: #0047AB;
            --light-bg: #f8fafd;
            --text-dark: #1a1a1a;
            --sidebar-width: 260px;
        }
        body { font-family: 'Pretendard', sans-serif; margin: 0; display: flex; background-color: var(--light-bg); color: var(--text-dark); line-height: 1.6; }
        
        /* Sidebar Navigation */
        nav { width: var(--sidebar-width); height: 100vh; background-color: var(--cobalt-blue); color: #ffffff; position: fixed; padding: 50px 30px; box-sizing: border-box; display: flex; flex-direction: column; }
        nav h1 { font-size: 1.5rem; margin-bottom: 50px; font-weight: 800; letter-spacing: 1px; }
        .nav-links { display: flex; flex-direction: column; gap: 25px; }
        nav a { color: rgba(255, 255, 255, 0.7); text-decoration: none; font-weight: 500; transition: 0.3s; }
        nav a:hover { color: #ffffff; padding-left: 5px; }
        
        main { margin-left: var(--sidebar-width); padding: 80px 60px; width: 100%; max-width: 1000px; }
        
        /* Sections */
        .hero h2 { font-size: 3.5rem; color: var(--cobalt-blue); margin: 0; font-weight: 900; line-height: 1.1; }
        .hero p { font-size: 1.2rem; color: #555; margin-top: 10px; font-weight: 500; }
        
        .section-title { font-size: 1.8rem; font-weight: 700; margin-top: 80px; margin-bottom: 30px; border-left: 5px solid var(--cobalt-blue); padding-left: 15px; }
        
        /* About Grid */
        .about-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
        .skill-card { background: #ffffff; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-top: 4px solid var(--cobalt-blue); }
        .skill-card ul { list-style: none; padding: 0; font-size: 0.95rem; line-height: 2; }
        
        /* Project Grid */
        .project-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 25px; }

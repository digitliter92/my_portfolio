<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Hello World!</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        :root {
            --cobalt-blue: #0047AB;
            --light-bg: #f8fafd;
            --text-dark: #1a1a1a;
            --sidebar-width: 260px;
        }
        body { font-family: 'Pretendard', sans-serif; margin: 0; display: flex; background-color: var(--light-bg); color: var(--text-dark); line-height: 1.6; }
        nav { width: var(--sidebar-width); height: 100vh; background-color: var(--cobalt-blue); color: #ffffff; position: fixed; padding: 50px 30px; box-sizing: border-box; display: flex; flex-direction: column; }
        nav h1 { font-size: 1.5rem; margin-bottom: 50px; font-weight: 800; }
        .nav-links { display: flex; flex-direction: column; gap: 25px; }
        nav a { color: rgba(255, 255, 255, 0.7); text-decoration: none; font-weight: 500; }
        nav a:hover { color: #ffffff; }
        main { margin-left: var(--sidebar-width); padding: 80px 60px; width: 100%; max-width: 900px; }
        .hero h2 { font-size: 4rem; color: var(--cobalt-blue); margin: 0; font-weight: 900; }
        .section-title { font-size: 1.8rem; font-weight: 700; margin-top: 60px; margin-bottom: 30px; border-left: 5px solid var(--cobalt-blue); padding-left: 15px; }
        .project-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        
        /* 카드 스타일 */
        .card { background: #ffffff; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .card img { width: 100%; height: 180px; object-fit: cover; border-radius: 8px; margin-bottom: 15px; }
        .card h4 { color: var(--cobalt-blue); margin-top: 0; }
        
        /* 상세보기 버튼 */
        .btn-detail { background: var(--cobalt-blue); color: white; border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 0.9rem; transition: 0.3s; }
        .btn-detail:hover { background: #003580; }

        /* 모달(팝업창) 스타일 */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); align-items: center; justify-content: center; }
        .modal-content { background: white; width: 90%; max-width: 700px; max-height: 85vh; border-radius: 16px; padding: 40px; overflow-y: auto; position: relative; }
        .close { position: absolute; right: 25px; top: 20px; font-size: 1.5rem; cursor: pointer; color: #999; }
        
        .modal-header { border-bottom: 2px solid var(--light-bg); padding-bottom: 15px; margin-bottom: 25px; }
        .modal-header h3 { color: var(--cobalt-blue); margin: 0; font-size: 1.8rem; }
        .detail-item { margin-bottom: 25px; }
        .detail-label { font-weight: 700; color: var(--cobalt-blue); display: block; margin-bottom: 8px; font-size: 1.1rem; }
        .tech-tag { background: #f0f4f8; color: #446688; padding: 4px 10px; border-radius: 4px; font-size: 0.85rem; margin-right: 5px; font-weight: 600; }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            nav { width: 100%; height: auto; position: relative; padding: 30px; }
            main { margin-left: 0; padding: 40px 20px; }
        }
    </style>
</head>
<body>
    <nav>
        <h1>PORTFOLIO</h1>
        <div class="nav-links">
            <a href="#about">About</a>
            <a href="#projects">Projects</a>
            <a href="#contact">Contact</a>
        </div>
    </nav>
    <main>
        <section class="hero">
            <h2>Hello World!</h2>
            <p>Embedded Systems & Control Engineering Specialist</p>
        </section>

        <section id="projects">
            <h3 class="section-title">Projects</h3>
            <div class="project-grid">
                <div class="card">
                    <img src="my_fortplio.webp" alt="Assistive Tech">
                    <h4>Assistive Technology</h4>
                    <p>Obstacle detection system using sensor fusion.</p>
                    <button class="btn-detail" onclick="openModal('project1')">상세보기</button>
                </div>

                <div class="card">
                    <div style="width:100%; height:180px; background:#e9ecef; border-radius:8px; margin-bottom:15px; display:flex; align-items:center; justify-content:center; color:#adb5bd;">No Image</div>
                    <h4>Safety Control</h4>
                    <p>Automated braking system for wheelchairs.</p>
                    <button class="btn-detail" onclick="openModal('project2')">상세보기</button>
                </div>
            </div>
        </section>
    </main>

    <div id="projectModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <div id="modalBody">
                </div>
        </div>
    </div>

    <script>
        // 프로젝트 데이터 정리 (이 부분을 수정해서 내용을 채우세요!)
        const projectData = {
            project1: {
                title: "Assistive Technology Project",
                overview: "시각장애인의 보행 안전을 위해 ToF 센서와 초음파 센서를 결합하여 지면의 고저차 및 장애물을 감지하는 시스템입니다.",
                hardware: ["ESP32", "ToF Sensor (VL53L1X)", "Ultrasonic Sensor", "Haptic Motor"],
                logic: "센서 데이터의 노이즈 제거를 위한 Median Filter 적용 및 거리 변화율 기반 장애물 위험도 판단 알고리즘 구현.",
                result: "정면 2m 이내 장애물 감지율 98% 달성 및 실시간 진동 피드백 구현."
            },
            project2: {
                title: "Safety Control System",
                overview: "수동 휠체어의 안전성을 높이기 위해 경사로 밀림 방지 및 내리막 자동 감속 제어 시스템을 구축했습니다.",
                hardware: ["Arduino Nano", "MPU6050 (IMU)", "Encoder Motor", "Li-Po 14.8V"],
                logic: "MPU6050을 활용한 경사각 측정 및 목표 속도 유지를 위한 PID 제어 알고리즘 (Laplace Transform 기반 모델링).",
                result: "15도 경사로에서 후방 밀림 제로 달성 및 내리막 정속 주행 검증."
            }
        };

        function openModal(id) {
            const data = projectData[id];
            const modal = document.getElementById('projectModal');
            const body = document.getElementById('modalBody');

            body.innerHTML = `
                <div class="modal-header">
                    <h3>${data.title}</h3>
                </div>
                <div class="detail-item">
                    <span class="detail-label">Project Overview</span>
                    <p>${data.overview}</p>
                </div>
                <div class="detail-item">
                    <span class="detail-label">Hardware Stack</span>
                    <div>${data.hardware.map(tech => `<span class="tech-tag">${tech}</span>`).join('')}</div>
                </div>
                <div class="detail-item">
                    <span class="detail-label">Core Logic</span>
                    <p>${data.logic}</p>
                </div>
                <div class="detail-item">
                    <span class="detail-label">Final Result</span>
                    <p>${data.result}</p>
                </div>
            `;
            modal.style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('projectModal').style.display = 'none';
        }

        window.onclick = function(event) {
            if (event.target == document.getElementById('projectModal')) closeModal();
        }
    </script>
</body>
</html>
